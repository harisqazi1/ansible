- name: Ubuntu Configuration
  hosts: all
  
  vars_files:
    - config.yml

  roles:
    - role: petermosmans.customize-gnome
      tags: ["gnome"]
    - role: samyroad.ohmyzsh
      become: true
      tags: ["ohmyzsh"]
    
  tasks:
    - name: Install apt packages that have keys
      ansible.builtin.import_tasks:
        file: tasks/apt_signed.yml
      tags: ["apt_signed"]

    - name: Install apt packages
      ansible.builtin.import_tasks:
        file: tasks/apt.yml
      tags: ["apt"]

    - name: Install flatpak packages
      ansible.builtin.import_tasks:
        file: tasks/flatpak.yml
      tags: ["flatpak"]
    
    - name: Install the Brave browser
      ansible.builtin.import_tasks:
        file: tasks/brave.yml
      tags: ["brave"]
      
    - name: "Install the tor browser in /home/{{ username }}/Downloads/"
      ansible.builtin.import_tasks:
        file: tasks/tor.yml
      tags: ["tor"]

    - name: Install snap packages
      ansible.builtin.import_tasks:
        file: tasks/snap.yml
      tags: ["snap"]
    
    - name: Install .deb packages
      ansible.builtin.import_tasks:
        file: tasks/deb_packages.yml
      tags: ["deb"]
    
    - name: Install npm packages
      ansible.builtin.import_tasks:
        file: tasks/npm.yml
      tags: ["npm"]
    
    - name: Modify the hostname
      ansible.builtin.import_tasks:
        file: tasks/hostname.yml
      tags: ["hostname"]
    
    - name: Install Theme and Icons
      ansible.builtin.import_tasks:
        file: tasks/hostname.yml
      tags: ["theme_icons"]

    - name: Pop!_OS Hardening
      ansible.builtin.import_tasks:
        file: tasks/hardening.yml
      tags: ["hardening"]

    - name: Download dotfiles
      ansible.builtin.import_tasks:
        file: tasks/dotfiles.yml
      tags: ["dotfiles"]

    - name: Install cheat
      ansible.builtin.import_tasks:
        file: tasks/cheat.yml
      tags: ["cheat"]